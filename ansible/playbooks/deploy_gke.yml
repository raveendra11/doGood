---
- name: Deploy doGood to GKE
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    manifests:
      - k8s/deployment.yaml
      - k8s/backendconfig.yaml
      - k8s/service.yaml
      - k8s/podmonitoring.yaml
      - k8s/ingress.yaml
  tasks:
    - name: Ensure required deployment variables are set
      ansible.builtin.assert:
        that:
          - full_image is defined
          - full_image | length > 0
          - deployment_name is defined
          - deployment_name | length > 0
          - container_name is defined
          - container_name | length > 0

    - name: Apply Kubernetes manifests
      ansible.builtin.command: kubectl apply -f {{ item }}
      loop: "{{ manifests }}"

    - name: Update deployment image
      ansible.builtin.command: >
        kubectl set image deployment/{{ deployment_name }}
        {{ container_name }}={{ full_image }}

    - name: Wait for deployment rollout
      ansible.builtin.command: >
        kubectl rollout status deployment/{{ deployment_name }} --timeout={{ rollout_timeout | default('600s') }}
